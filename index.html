    <script>
      (function() {
        // 1. Provide a sacrificial 'global' object to absorb polyfill assignments
        if (!window.global || window.global === window) {
          window.global = {};
        }

        // 2. The 'Setter Trap' for fetch:
        // Some libraries (like node-fetch polyfills) try to do `window.fetch = ...` or `globalThis.fetch = ...`
        // which fails in many environments because fetch is a read-only getter.
        var originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(newFetch) { 
              console.warn("Blocked attempt to overwrite window.fetch. Using native fetch instead.");
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.error("Critical: Could not apply fetch protection trap.", e);
        }
      })();
    </script>
